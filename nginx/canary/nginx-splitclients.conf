# 金丝雀发布:基于 split_clients 按比例分流
# 部署位置:服务器 ~/fe-depoly-canary/nginx.conf
# 来源:仓库 nginx/canary/nginx-splitclients.conf → git pull 同步到服务器
#
# 切换策略:
#   - 5% 流量(按 IP+UA 哈希)走 web-v2
#   - 95% 流量走 web-v1
# 同一用户始终命中同一版本(IP/UA 不变 → 哈希结果不变)
#
# 逐步放量流程:
#   1. 5% 观察半小时  → sed 改 '5%' 为 '25%'
#   2. 25% 观察 1-4h  → sed 改 '25%' 为 '50%'
#   3. 50% 观察 2-8h  → sed 改 '50%' 为 '*'
#   4. 全量后把 default 也改成 web-v2
# 回滚:把比例改回 0%(即 split_clients 只剩 "* web-v1")

split_clients "${remote_addr}${http_user_agent}" $backend {
    5%   web-v2;
    *    web-v1;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Canary-Backend $backend;
    }

    location = /healthz {
        proxy_pass http://web-v1/healthz;
    }
}
