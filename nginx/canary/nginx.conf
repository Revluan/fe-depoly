# 金丝雀发布:基于 Cookie 分流
# 部署位置:服务器 ~/fe-depoly-canary/nginx.conf
# 来源:仓库 nginx/canary/nginx.conf → git pull 同步到服务器
#
# 切换策略:
#   - 普通 user(无 cookie)         → web-v1
#   - 内测 user(cookie canary=true)→ web-v2
# 全量发布:把 map 的 default 改成 web-v2
# 回滚:     把 map 的 default 改回 web-v1

map $cookie_canary $backend {
    default  web-v1;
    "true"   web-v2;
    "1"      web-v2;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 响应头标识当前命中的版本,方便排查
        add_header X-Canary-Backend $backend;
    }

    # 健康检查(走 v1 即可,只验证 nginx 自身可用)
    location = /healthz {
        proxy_pass http://web-v1/healthz;
    }
}
