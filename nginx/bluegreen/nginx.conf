# 蓝绿部署:Nginx 反向代理切换 upstream
# 部署位置:服务器 ~/fe-depoly-bluegreen/nginx.conf
# 来源:仓库 nginx/bluegreen/nginx.conf → git pull 同步到服务器
#
# 切换策略:
#   - 默认指向 web-blue(v1.0.0)
#   - 切换到 web-green(v1.0.1):注释 blue 行,取消注释 green 行,reload
#   - 回滚:反向操作
#
# 切换命令(服务器执行):
#   cd ~/fe-depoly-bluegreen
#   sed -i 's|server web-blue:80;|# server web-blue:80;|' nginx.conf
#   sed -i 's|# server web-green:80;|server web-green:80;|' nginx.conf
#   docker exec bg-nginx nginx -t && docker exec bg-nginx nginx -s reload

upstream backend {
    # 蓝色环境(当前版本)
    server web-blue:80;
    # 绿色环境(新版本)—— 切换时取消注释
    # server web-green:80;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://backend/healthz;
    }
}
