name: Deploy to R2 + Worker

on:
  push:
    branches: [main]
    # 只在影响部署产物的文件变更时触发,避免只改文档也跑 CI
    paths:
      - 'src/**'
      - 'public/**'
      - 'worker/**'
      - 'scripts/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'vite.config.*.ts'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-r2-worker.yml'
  workflow_dispatch:

env:
  AWS_REGION: auto
  AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
        env:
          # Sentry:CI 构建时上传 source map,关联到 Release
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # VITE_ 开头的变量会注入到客户端代码
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      # 同步 dist/ 到 R2(--delete 清理旧文件)
      - name: Sync to R2
        run: |
          aws s3 sync dist/ s3://fe-depoly-assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --endpoint-url "$AWS_ENDPOINT_URL"
          # index.html 单独上传,短缓存
          aws s3 cp dist/index.html s3://fe-depoly-assets/index.html \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --endpoint-url "$AWS_ENDPOINT_URL"

      # 部署 Worker
      - name: Deploy Worker
        working-directory: worker
        run: |
          npm ci
          npx wrangler deploy \
            --var CURRENT_VERSION:${{ github.sha }} \
            --var DEPLOY_TIME:$(date -u +%Y-%m-%dT%H:%M:%SZ)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}