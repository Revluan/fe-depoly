# ──────────────────────────────────────────────────────────────
# 暂时停用:已切换到 Cloudflare R2 + Worker 部署(见 doc/cdn-cache.md)
# R2 + Worker 部署走独立的 deploy-r2-worker.yml,push main 即触发
# Changesets 版本管理逻辑保留,但不再自动触发生产部署
# ──────────────────────────────────────────────────────────────

# Release 工作流：自动版本号 + Changelog + 打 tag
# 作用：合入 main 后，如果有未消费的 changeset，自动创建一个 PR 改版本号和 CHANGELOG；
#       合入该 PR 时，自动打 git tag，触发生产部署
#
# 完整流程：
#   1. 开发者跑 `npm run changeset` 描述本次变更，提交 .changeset/*.md
#   2. PR 合入 main → 本 workflow 检测到未消费的 changeset
#   3. 自动创建 "Version Packages" PR：改 package.json 版本 + 写 CHANGELOG.md
#   4. 维护者合入 Version Packages PR
#   5. 本 workflow 再次跑，无未消费 changeset，进入 "Tag release" 步骤
#   6. 自动打 v*.*.* tag 并 push → 触发 deploy-production.yml
name: Release

on:
  # 暂时停用:不再在 push main 时自动跑 changesets
  # 需要发版时手动触发
  workflow_dispatch:

# 不取消旧 run：版本管理需要串行，避免并发改版本号冲突
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

# Release 需要写权限：
# - contents: write  —— 打 tag、推 commit
# - pull-requests: write —— 创建 Version Packages PR
permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version & Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # 拉完整历史，Changesets 需要对比 commits 来生成 changelog
          # 默认 fetch-depth: 1 只拉最新一个 commit，不够
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 核心步骤：Changesets 智能决策
      # - 如果有未消费的 changeset → 创建 "Version Packages" PR（改版本+写 changelog）
      # - 如果没有未消费的 changeset 且存在待发布的 version PR 被合入 → 直接发布
      # 输出 hasChanges：true 表示创建了 PR（本次到此为止），false 表示可以打 tag
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          version: npm run version # 跑 changeset version 命令
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 没有 changeset 待处理（说明 Version PR 已合入）→ 打 tag 触发生产部署
      # hasChanges == false 时才执行
      - name: Tag release
        if: steps.changesets.outputs.hasChanges == 'false'
        run: |
          # 从 package.json 读版本号，加 v 前缀，例如 0.1.3 → v0.1.3
          VERSION="v$(node -p "require('./package.json').version")"

          # 检查 tag 是否已存在（避免重复打）
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Created and pushed tag $VERSION"
          fi
