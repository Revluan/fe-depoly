# ──────────────────────────────────────────────────────────────
# 暂时停用:已切换到 Cloudflare R2 + Worker 部署(见 doc/cdn-cache.md)
# SPA 不需要 Docker 镜像,Worker 直接从 R2 读静态资源
# 保留 workflow_dispatch 以便后续需要 Docker 部署时手动触发
# ──────────────────────────────────────────────────────────────

name: Docker Build & Push

on:
  # 只保留手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag（如 1.0.1）'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          # 推 main 分支 → 用 short SHA 做 tag
          # 推 v1.0.0 tag → 用 1.0.0 做 tag
          # 手动触发 → 用输入值
          if [ -n "${{ inputs.tag }}" ]; then
            echo "VERSION=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/fe-depoly:${{ steps.meta.outputs.VERSION }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/fe-depoly:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false